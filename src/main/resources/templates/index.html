<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AI 同声传译助手</title>
    <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app">
    <!-- 顶部标题 -->
    <header class="header">
        <h1>AI 同声传译助手</h1>
        <p class="subtitle">实时语音识别 &amp; 智能翻译</p>
    </header>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="control-row">
            <label for="sourceLang">源语言</label>
            <select id="sourceLang" class="select-lang">
                <option value="en" selected>English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
            </select>
            <span class="arrow">→</span>
            <span class="target-lang">中文</span>

            <button id="btnStart" class="btn btn-start">开始同传</button>
            <button id="btnStop" class="btn btn-stop" disabled>停止</button>
            <button id="btnTTS" class="btn btn-tts" onclick="toggleTTS()">🔇 语音关</button>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="volume-indicator" id="volumeBar">
                <span class="volume-label">音量</span>
                <div class="volume-track">
                    <div class="volume-fill" id="volumeFill"></div>
                </div>
            </div>
            <span class="status-text" id="statusText">就绪</span>
            <span class="error-text" id="errorText"></span>
        </div>
    </div>

    <!-- 字幕区域 -->
    <div class="subtitle-area" id="subtitleArea">
        <div class="empty-hint" id="emptyHint">
            点击"开始同传"后，翻译结果将在这里实时显示
        </div>
        <!-- 字幕条目动态插入到这里 -->
        <div class="interim-text" id="interimText"></div>
    </div>

    <!-- 回到最新按钮 -->
    <button class="btn-scroll-bottom" id="btnScrollBottom" style="display:none;">
        ↓ 回到最新
    </button>
</div>

<script src="/js/app.js"></script>
</body>
</html>
