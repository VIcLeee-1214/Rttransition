server:
  port: 8080

spring:
  application:
    name: rt-translation
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379

# 强制控制台 UTF-8 编码（解决 Windows 中文乱码）
logging:
  charset:
    console: UTF-8

# ====== 自定义业务配置 ======

# 讯飞实时语音识别
iflytek:
  app-id: ${IFLYTEK_APP_ID:}
  api-key: ${IFLYTEK_API_KEY:}
  api-secret: ${IFLYTEK_API_SECRET:}
  # en_us = 英文识别, mandarin = 中文, mand_en_a = 中英混合
  accent: en_us

# DeepSeek 翻译（兼容 OpenAI 接口）
openai:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com/v1
  model: deepseek-chat
  temperature: 0.3

# 认证（配置后启用，留空则不启用）
app:
  auth:
    token: ${APP_AUTH_TOKEN:}

# 翻译参数
translation:
  # prompt 中保留的最大历史轮数
  max-context-turns: 20
  # 每 N 句触发一次回顾纠错
  review-interval: 20
  # 句子缓冲区超时（秒）
  sentence-buffer-timeout: 5.0
